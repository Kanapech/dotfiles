source=~/.local/share/rices/default/hypr/hyprlock/colors.conf

background {
    monitor = 
    path = $background_image
    blur_passes = 3
    blur_size = 10
    noise = 0.05
    contrast = 0.89
    brightness = 1
    vibrancy = 0.5
    vibrancy_darkness = 0.0
}

label { # Switch user
    monitor =
    text = 󰀓
    color = $text_color
    font_size = 50
    font_family = $font_nerd_symbols
    onclick = loginctl terminate-session $XDG_SESSION_ID
    position = 0, 100
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.1
    dots_spacing = 0.3
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    font_family = $font_family
    fade_on_empty = false
    placeholder_text = <i>    Enter Pass</i>
    position = 0, 20
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT
    color = $text_color
    font_size = 14
    font_family = $font_family
    position = -30, 30
    halign = right
    valign = bottom
}

label { # Caps Lock Warning
    monitor =
    text = cmd[update:250] $HOME/.local/share/rices/default/hypr/hyprlock/capslock.sh
    color = $text_color
    font_family = $font_family
    position = 0, -25
    halign = center
    valign = center
}

label { # Clock
    monitor =
    text = $TIME
    color = $text_color
    font_size = 65
    font_family = $font_family_clock
    position = 0, 300
    halign = center
    valign = center
}

label { # Date
    monitor =
    text = cmd[update:5000] $HOME/.local/share/rices/default/hypr/hyprlock/date.sh
    color = $text_color
    font_size = 17
    font_family = $font_family_clock
    position = 0, 240
    halign = center
    valign = center
}

label { # User
    monitor =
    text = $USER
    color = $text_color
    font_size = 20
    font_family = $font_family
    position = 0, 50
    halign = center
    valign = bottom
}

label { # Status
    monitor =
	text = cmd[update:5000] $HOME/.local/share/rices/default/hypr/hyprlock/status.sh
	color = $text_color
    font_size = 14
    font_family = $font_family
    position = 30, -30
    halign = left
    valign = top
}

# Reboot
label {
    monitor =
    text = 󰜉
    color = $text_color
    font_family = $font_nerd_symbols
    font_size = 50
    onclick = reboot now
    position = 0, 100
    halign = center
    valign = bottom
}

# Power off
label {
    monitor =
    text = 󰐥
    color = $text_color
    font_family = $font_nerd_symbols
    font_size = 50
    onclick = shutdown now
    position = 200, 100
    halign = center 
    valign = bottom
}

# Suspend
label {
    monitor =
    text = 󰤄
    color = $text_color
    font_family = $font_nerd_symbols
    font_size = 50
    onclick = systemctl suspend
    position = -200, 100
    halign = center
    valign = bottom
}
