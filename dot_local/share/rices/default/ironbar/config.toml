name = "bar"
position = "top"
height = 20
layer = "background"
"margin.left" = 10
"margin.right" = 10
"margin.top" = 5

[[start]]
type = "menu"
label = "󱓞"
center = [ ]
end = [ ]

  [[start.start]]
  type = "custom"
  label = "  Terminal"
  on_click = "kitty"

  [[start.start]]
  type = "custom"
  label = " Reboot"
  on_click = "systemctl reboot"

  [[start.start]]
  type = "custom"
  label = "  Power Off"
  on_click = "systemctl poweroff"

[[start]]
type = "custom"

  [[start.bar]]
  type = "label"
  label = " 󰿟 "
  class = "divider"

[[start]]
type = "workspaces"

[[center]]
type = "focused"
icon_size = 14
truncate = "end"

[[end]]
type = "tray"

[[end]]
type = "custom"

  [[end.bar]]
  type = "label"
  label = " 󰿟 "
  class = "divider"

[[end]]
type = "volume"
format = "{icon}  {percentage}%"
max_volume = 100

  [end.icons]
  muted = ""
  volume_low = ""
  volume_medium = ""
  volume_high = ""

[[end]]
type = "custom"

  [[end.bar]]
  type = "label"
  label = " 󰿟 "
  class = "divider"

[[end]]
type = "clock"
format = "%H:%M"

  [[end.bar]]
  type = "label"
  label = " 󰿟 "
  class = "divider"

[[end]]
type = "keyboard"
show_scroll = false

[end.icons]
caps_on = "󰪛"

[end.icons.layout_map]
"English (US)" = "English"
"French" = "Fr"

[[end]]
type = "notifications"

[[end]]
class = 'power-menu'
tooltip = '''Up: {{30000:uptime -p | cut -d ' ' -f2-}}'''
type = 'custom'

[[end.bar]]
label = ''
name = 'power-btn'
on_click = 'popup:toggle'
type = 'button'

[[end.popup]]
orientation = 'vertical'
type = 'box'

[[end.popup.widgets]]
label = 'Power menu'
name = 'header'
type = 'label'

[[end.popup.widgets]]
type = 'box'

[[end.popup.widgets.widgets]]
class = 'power-btn'
label = '''<span font-size='40pt'></span>'''
on_click = '!shutdown now'
type = 'button'

[[end.popup.widgets.widgets]]
class = 'power-btn'
label = '''<span font-size='40pt'></span>'''
on_click = '!reboot'
type = 'button'

[[end.popup.widgets]]
label = '''Uptime: {{30000:uptime -p | cut -d ' ' -f2-}}'''
name = 'uptime'
type = 'label'
