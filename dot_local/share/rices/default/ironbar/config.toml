name = "bar"
icon_theme = "Paper"

position = "top"

[[start]]
type = "menu"
label = "󱓞"

[[start]]
type = "workspaces"

[[start]]
type = "launcher"
favorites = ["firefox", "discord", "kitty"]
icon_size = 25

[start.truncate]
mode = "end"
max_length = 30

[[center]]
type = "music"
player_type = "mpd"
format = "{title} / {artist}"
truncate = "end"

[center.icons]
play = ""
pause = ""

[[end]]
type = "focused"
show_icon = true
show_title = true
icon_size = 15
truncate = "start"

[[end]]
type = "battery"
show_if = "ls /sys/class/power_supply/ | grep --quiet '^BAT'"

[[end]]
type = "sys_info"
format = [
    "{cpu_percent}%   | {temp_c:k10temp-Tctl}°C",
    "{memory_percent}% "
]

[end.interval]
cpu = 5
memory = 5
temps = 5

[[end]]
type = "clipboard"
max_items = 10

[end.truncate]
mode = "end"
length = 30

[[end]]
type = "volume"
format = "{icon} {percentage}%"
popup_orientation = 'vertical'
sink_slider_orientation = 'vertical'
source_slider_orientation = 'vertical'

[end.icons]
volume_high = "󰕾"
volume_medium = "󰖀"
volume_low = "󰕿"
muted = "󰝟"

[[end]]
type = "tray"

[[end]]
type = "clock"

[[end]]
type = "keyboard"
show_scroll = false

[end.icons]
caps_on = "󰪛"

[end.icons.layout_map]
"English (US)" = "English"
"French" = "Fr"

[[end]]
type = "notifications"

[[end]]
class = 'power-menu'
tooltip = '''Up: {{30000:uptime -p | cut -d ' ' -f2-}}'''
type = 'custom'

[[end.bar]]
label = ''
name = 'power-btn'
on_click = 'popup:toggle'
type = 'button'

[[end.popup]]
orientation = 'vertical'
type = 'box'

[[end.popup.widgets]]
label = 'Power menu'
name = 'header'
type = 'label'

[[end.popup.widgets]]
type = 'box'

[[end.popup.widgets.widgets]]
class = 'power-btn'
label = '''<span font-size='40pt'></span>'''
on_click = '!shutdown now'
type = 'button'

[[end.popup.widgets.widgets]]
class = 'power-btn'
label = '''<span font-size='40pt'></span>'''
on_click = '!reboot'
type = 'button'

[[end.popup.widgets]]
label = '''Uptime: {{30000:uptime -p | cut -d ' ' -f2-}}'''
name = 'uptime'
type = 'label'
