$qsConfig = compiled

exec = hyprctl dispatch submap global
submap = global

# Rice-independent keybinds
source = /home/joran/.local/share/chezmoi/rice-configs/base.conf

# Environment variables
source = /home/joran/.config/hypr/hyprland/env.conf
source = /home/joran/.config/hypr/custom/env.conf

# Compiled rice execs
source = /home/joran/.config/hypr/hyprland/execs-compiled.conf

# Keybinds
bind = Super, R, exec, hyprlauncher
bind = Super, N, exec, swaync-client -t
bind = Super, V, exec, cliphist list | hyprlauncher --dmenu | cliphist decode | wl-copy

# Defaults
source = /home/joran/.config/hypr/hyprland/general.conf
source = /home/joran/.config/hypr/hyprland/rules.conf
source = /home/joran/.config/hypr/hyprland/colors.conf
source = /home/joran/.config/hypr/hyprland/keybinds.conf

# Custom
source = /home/joran/.config/hypr/custom/general.conf
source = /home/joran/.config/hypr/custom/rules.conf
source = /home/joran/.config/hypr/custom/keybinds.conf

# nwg-displays
source = /home/joran/.config/hypr/workspaces.conf
source = /home/joran/.config/hypr/monitors.conf
